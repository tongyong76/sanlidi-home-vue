<include file="Public:header" />

<script type="text/javascript">
	function status(id,type){
	    $.get("{:U('Admin/status')}", { id: id, type: type }, function(data){
			$("#"+type+"_"+id+" img").attr('src', '__PUBLIC__/statics/images/status_'+data.data+'.gif')
		},"json"); 
	}
</script>

</head>
<div class="pad-10" >
    <form id="myform" name="myform" action="{:U('Admin/delete')}" method="post">
    <div class="table-list">
    <table width="100%" cellspacing="0">
        <thead>
            <tr>
                <th width="5%">序号</th>
                <th width="1%"><input type="checkbox" value="" id="check_box" onclick="selectall('id[]');"></th>
                <th width=100>帐号</th>
      			<th width=100>开通时间 :</th>
                <th width=100>上次登陆</th>
                <th width=100>操作</th>
            </tr>
        </thead>
    	<tbody>
        <volist name="admin_list" id="val" >
        <tr>
        	<td align="center">{$key+1}</td>
            <td align="center"><input type="checkbox" value="{$val.id}" name="id[]" <if condition="$val['id'] eq '1'">disabled="disabled"</if>></td>
            <td align="center"><a href="{:U('Admin/edit',array('id'=>$val['id']))}"><em style="color:black;">{$val.username}</em></a></td>
     		<td align="center">{$val.add_time|date='Y-m-d H:i:s',###}</td>
            <td align="center">{$val.last_time|date='Y-m-d H:i:s',###}</td>
            <td align="center"><a class="blue" href="{:U('Admin/edit',array('id'=>$val['id']))}">编辑</a></td>
		</tr>
        </volist>
    	</tbody>
    </table>

    <div class="btn">
    	<label for="check_box" style="float:left;">全选/取消</label>
		<input type="submit" class="button" name="add" onclick="document.myform.action='{:U('Admin/add')}'" value="新增" style="margin:0 0px 0 10px;"/>
    	<input type="submit" class="button" name="submit" value="删除" style="margin:0 10px 0 10px;" onclick="return check();"/>
    	<input type="submit" class="button" name="order" onclick="document.myform.action='{:U('Admin/order')}'" value="排序" style="margin:0 10px 0 0px;"/>
    	<div id="pages">{$page}</div>
    </div>

    </div>
    </form>
</div>
</body>
</html>
