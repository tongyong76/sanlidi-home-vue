<include file="Public:header" />

<script type="text/javascript">
	$(document).ready(function(){
		$(".preview").preview();
	});
	
	function status(id,type){
		$.get("{:u('Banner/status')}", { id: id, type: type }, function(data){
			$("#"+type+"_"+id+" img").attr('src','__PUBLIC__/statics/images/status_'+data+'.gif')
		},"json"); 
	}
</script>

</head>
<body>
<div class="pad-10" >
    <form id="myform" name="myform" action="{:u('Banner/delete')}" method="post">
    <div class="table-list">
    <table width="100%" cellspacing="0">
        <thead>
            <tr>
				<th width="5%"><input type="checkbox" value="" id="check_box" onclick="selectall('id[]');"></th>
				<th width="200" align="left">名称</th>
				<th width="80">图片</th>              
                <th width="200" align="left">链接地址</th>
				<th width="60">排序值</th>
				<th width="60">是否显示</th>
                <th width="150">操作</th>
            </tr>
        </thead>
    	<tbody>
        <volist name="list" id="val" >
        <tr>
			<td align="center"><input type="checkbox" value="{$val.id}" name="id[]"></td>
			<td align="left">
				<if condition="$val['pid']">&nbsp;&nbsp;&nbsp;&nbsp;|-</if>
				<a href="{:u('Banner/edit', array('id'=>$val['id']))}">{$val.name}</a>
			</td>
			<td align="center"><img src="<if condition="$val['imgurl']">__ROOT__{$val.imgurl}<else />__ROOT__/Uploads/noimg.jpg</if>" width="40px" height="30px" class="preview" bimg="__ROOT__{$val.imgurl}" title="<php>if(strpos($val['img'],'http') === false){echo '本地图片';}else{echo '远程图片';}</php>" /></td>            
            <td align="left"><b>{$val.link}</b></td>
			<td align="center"><input type="text" class="input-text-c input-text" value="{$val.ordid}" size="4" name="orders[{$val.id}]"></td>
            <td align="center" onclick="status({$val.id},'is_show')" id="is_show_{$val.id}"><img src="__PUBLIC__/statics/images/status_{$val.is_show}.gif" /></td>
            <td align="center"><if condition="!$val['pid']"><a class="blue" href="{:u('Banner/add',array('pid'=>$val['id']))}">添加小幻灯</a></if><a class="blue" href="{:u('Banner/edit',array('id'=>$val['id']))}">修改</a></td>
        </tr>
        </volist>
    	</tbody>
    </table>

    <div class="btn">
		<!--
    	<input type="submit" class="button" name="add" onclick="document.myform.action='{:U('Banner/add')}'" value="新增" style="margin:0 0px 0 10px;"/>
    	<input type="submit" class="button" name="submit" value="删除" style="margin:0 10px 0 10px;" onclick="return check();"/>
		-->
    	<input type="submit" class="button" name="order" onclick="document.myform.action='{:U('Banner/order')}'" value="排序" style="margin:0 10px 0 0px;"/>
		<div id="pages"></div>
    </div>

    </div>
    </form>
</div>
</body>
</html>
