<include file="Public:header" />

<script type="text/javascript">
	$(document).ready(function(){
		$(".preview").preview();
	});
	
	function status(id,type){
		$.get("{:u('Hotel/status')}", { id: id, type: type }, function(data){
			$("#"+type+"_"+id+" img").attr('src','__PUBLIC__/statics/images/status_'+data+'.gif')
		},"json"); 
	}
</script>

</head>
<body>
<div class="pad-10" >
    <form name="searchform" action="{:U('Hotel/index')}" method="post" >
    <input name="a" type="hidden" value="index">
    <input name="m" type="hidden" value="Hotel">
    <input name="g" type="hidden" value="Admin">
    <table width="100%" cellspacing="0" class="search-form">
        <tbody>
            <tr>
            <td>
            <div class="explain-col">
            	酒店名称关键字 :
                <input name="keyword" type="text" class="input-text" size="25" value="{$keyword}" />
                <input type="submit" name="search" class="button" value="搜索" />
        	</div>
            </td>
            </tr>
        </tbody>
    </table>
    </form>

    <form id="myform" name="myform" action="{:u('Hotel/delete')}" method="post">
    <div class="table-list">
    <table width="100%" cellspacing="0">
        <thead>
            <tr>
                <th width="5%">序号</th>
                <th width="1%"><input type="checkbox" value="" id="check_box" onclick="selectall('id[]');"></th>
				<th width=30>排序值</th>
                <!--<th width=60>缩略图</th>-->
				<th width=30>酒店ID</th>
                <th width=200 align="left">酒店名称</th>
				<th width=30>状态</th>
                <th width=120>操作</th>
            </tr>
        </thead>
    	<tbody>
        <volist name="hotelList" id="val" >
        <tr>
        	<td align="center">{$val.key}</td>
            <td align="center"><input type="checkbox" value="{$val.hotel_id}" name="id[]"></td>
			<td align="center"><input type="text" class="input-text-c input-text" value="{$val.ordid}" size="4" name="orders[{$val.id}]" /></td>
            <!--<td align="center"><img src="__ROOT__{$val.hotel_imgurl}" width="40px" height="40px" class="preview" bimg="__ROOT__{$val.hotel_imgurl}" title="<php>if(strpos($val['img'],'http') === false){echo '本地图片';}else{echo '远程图片';}</php>" /></td>-->
            <td align="center">{$val.hotel_id}</td>
			<td align="left"><a href="{:u('Hotel/edit',array('id'=>$val['hotel_id']))}">{$val.hotel_name}<if condition="!$is_master">{$val.type}</if></a></td>   
            <td align="center" onclick="status({$val.id},'status')" id="status_{$val.id}"><img src="__PUBLIC__/statics/images/status_{$val.status}.gif" /></td>
			<td align="center"><a class="blue" href="{:u('Hotel/edit',array('id'=>$val['hotel_id']))}">编辑</a></td>
        </tr>
        </volist>
    	</tbody>
    </table>

    <div class="btn">
    	<label for="check_box" style="float:left;">全选/取消</label>
		<input type="submit" class="button" name="add" onclick="document.myform.action='{:U('Hotel/add')}'" value="新增" style="margin:0 0px 0 10px;"/>
    	<input type="submit" class="button" name="submit" value="删除" style="margin:0 10px 0 10px;" onclick="return check();"/>
    	<input type="submit" class="button" name="order" onclick="document.myform.action='{:U('Hotel/order')}'" value="排序" style="margin:0 10px 0 0px;"/>
    	<div id="pages">{$page}</div>
    </div>

    </div>
    </form>
</div>
</body>
<script type="text/javascript">
$(function(){

});
</script>
</html>
