<include file="Public:header" />
<script language="javascript">var webpath="__PUBLIC__";</script>
<script type="text/javascript" src="__PUBLIC__/statics/js/common.js"></script>
<script type="text/javascript" src="__PUBLIC__/ueditor/ueditor.config.js"></script>
<script type="text/javascript" src="__PUBLIC__/ueditor/ueditor.all.min.js"></script>
<link rel="stylesheet" href="__PUBLIC__/ueditor/themes/default/css/ueditor.css"/>
<script type="text/javascript">
	$(document).ready(function(){
		$("#submit").click(function(){
			if($("#hotel_name").val()==0){
			   alert('请填写资讯分类');
			   return false;
			}
		});
		$('#type').change(function(){
			if($("#type").val()==1){
				$('#hidme').attr('class','');
			}else{
				$('#hidme').attr('class','hidme');
			}
		});
		//编辑器
		var editor = UE.getEditor('text', {toolbars:[['source', 'undo', 'bold', 'italic','link', 'unlink', 'formatmatch', 'underline', 'forecolor', 'backcolor', 'insertorderedlist', 'insertunorderedlist', 'selectall', 'cleardoc','justifyleft', 'justifycenter', 'justifyright', 'justifyjustify','inserttable','insertimage']],initialFrameHeight:300,pasteplain:false});
	});

</script>

</head>
<body>
<div class="pad_10">
<form action="{:U('Hotel/edit')}" method="post" name="myform" id="myform" enctype="multipart/form-data" style="margin-top:10px;">
  <div class="pad-10">
  <div class="col-tab">
  <ul class="tabBut cu-li">
    <li id="tab_setting_1" class="on" onClick="SwapTab('setting','on','',3,1);">基本信息</li>
	<li id="tab_setting_2" onClick="SwapTab('setting','on','',3,2);">图库</li>
    <li id="tab_setting_3" onClick="SwapTab('setting','on','',3,3);">SEO设置</li>
  </ul>
  <div id="div_setting_1" class="contentList pad-10">
    <table width="100%" cellpadding="2" cellspacing="1" class="table_form">
    <tr> 
        <th width="100">酒店名称 :</th>
        <td><input type="text" name="hotel_name" class="input-text" value="{$info.hotel_name}"></td>
    </tr>
	<tr> 
        <th width="100">酒店地址 :</th>
        <td><input type="text" name="hotel_address" class="input-text" value="{$info.hotel_address}"></td>
    </tr>
	<tr> 
        <th width="100">酒店标准 :</th>
        <td><input type="text" name="hotel_level" class="input-text" value="{$info.hotel_level}"></td>
    </tr>
	<tr>
        <th width="100">酒店简介 :</th>
        <td><textarea name="hotel_desc" id="text" style="width:70%;" rows="40">{$info.hotel_desc}</textarea></td>
    </tr>
	<input type="hidden" value="{$info.hotel_id}" name="hotel_id">
</table>
  </div>
  <div id="div_setting_2" class="contentList pad-10 hidden">
	<table width="100%" cellpadding="2" cellspacing="1" class="table_form" id="gallery_box">
	  <tr class="clearfix">
		<volist name="imgList" id="vo">
		<div id="gallery_{$vo.img_id}" style="float:left; text-align:center; border: 1px solid #DADADA; margin: 4px; padding:2px;">
		  <a href="javascript:;" onclick="dropImg({$vo.img_id})">[-]</a><br />
		  <input type="text" value="{$vo.img_date}" size="5" name="old_img_date[{$vo.img_id}]" /><br />
	      <img style="vertical-align:center;" width="150" src="__ROOT__{$vo.img_url}" border="0" />
		</div>
		</volist>
	  </tr>
	  <tr>
        <th width="100"><a href="javascript:;" onclick="addImg()">[+]</a>缩略图 :</th>
        <td>
            <input type="file" name="imgurl[]" class="input-text" size=21 style="height:25px;"/>
		</td>
      </tr>
	</table>
  </div>
  <div id="div_setting_3" class="contentList pad-10 hidden">
    <table width="100%" cellpadding="2" cellspacing="1" class="table_form">
     <tr>
      <th width="100">Title :</th>
      <td><input type="text" name="seo_title" id="seo_title" class="input-text" value="{$article_cate_info.seo_title}" size="50"></td>
    </tr>
    <tr>
      <th width="100">Keywords :</th>
      <td><input type="text" name="seo_keys" id="seo_keys" class="input-text" value="{$article_cate_info.seo_keys}" size="50"></td>
    </tr>
    <tr>
      <th width="100">Description :</th>
      <td><textarea name="seo_desc" cols="47" rows="4">{$article_cate_info.seo_desc}</textarea></td>
    </tr>
    </table>
  </div>
  <div class="bk15"></div>
  <div class="btn">
    <input type="submit" value="提交" name="submit" class="button" id="submit">
  </div>

</div>
</div>
</form>
</div>
<script type="text/javascript">
function addImg()
{
	var newdiv = '<tr><th width="100"><a href="javascript:;" class="removeImg">[-]</a>缩略图 :</th><td><input type="file" name="imgurl[]" class="input-text" size=21 style="height:25px;"/></td></tr>'; 
	$('#gallery_box').append(newdiv);
}

function dropImg(id){
	$.ajax({
		url: '__ROOT__/Ajax/dropImg',
		type: 'POST',
		data:{img_id:id},
		dataType: 'json',
		success: function(result){
			if(result.data){
				//alert(result.data);
				$('#gallery_'+result.data).remove();
			}else{
				//alert('未匹配到，请先添加酒店');
			}
		}
	});
}

$(function(){
	$('.removeImg').live('click',function(){
		$(this).parent().parent().remove();
	})
});
</script>
</body>
</html>
