<include file="Public:header" />

<script type="text/javascript">
	function status(id,type){
	    $.get("{:U('Navigation/status')}", { id: id, type: type }, function(data){
			$("#"+type+"_"+id+" img").attr('src', '__PUBLIC__/statics/images/status_'+data.data+'.gif')
		},"json"); 
	}
</script>

</head>
<div class="pad-lr-10" >
    <form id="myform" name="myform" action="{:U('Navigation/delete')}" method="post" >
    <div class="table-list" style="margin-top:10px;">
    <table width="100%" cellspacing="0">
        <thead>			
            <tr>
                <th width="5%"><input type="checkbox" value="" id="check_box" onclick="selectall('id[]');"></th>
				<th align="left" width="60">名称</th>
              	<th align="left" width="400">广告词</th>
                <th width="200">对应链接</th>               
            </tr>
        </thead>
    	<tbody>
		<volist name="list" id="vo" offset="0" length="3">
        <tr>
            <td align="center"><input type="checkbox" value="{$vo.id}" name="id[]"></td>
			<td align="left">{$vo.name}</td>
            <td align="left"><span class="tdedit" data-id="{$vo.id}" data-field="title" data-tdtype="edit">{$vo.title}</span></td>
            <td align="center"><span class="tdedit" data-id="{$vo.id}" data-field="link" data-tdtype="edit">{$vo.link}</span></td>
        </tr>
		<tr>
			<td><span style="text-align:right;">描述：</span></td>
			<td colspan="3"><span class="tdedit" data-id="{$vo.id}" data-field="content" data-tdtype="edit">{$vo.content}</span></td>
		</tr>
		</volist>
		<volist name="list" id="vo" offset="3" length="1">
        <tr>
            <td align="center"><input type="checkbox" value="{$vo.id}" name="id[]"></td>
			<td align="left">{$vo.name}</td>
            <td align="left"><span class="tdedit" data-id="{$vo.id}" data-field="title" data-tdtype="edit">{$vo.title}</span></td>
            <td align="center"><span class="tdedit" data-id="{$vo.id}" data-field="link" data-tdtype="edit">{$vo.link}</span></td>
        </tr>
		</volist>
    	</tbody>
    </table>
    </div>
    </form>
</div>

</body>
<script type="text/javascript">
$(document).ready(function(){
	//修改
	$('span[data-tdtype="edit"]').click(function(){
		var s_val   =	$.trim($(this).text()),            
			s_name  = 	$(this).attr('data-field'),
			s_id    = 	$(this).attr('data-id'),              
			width   = 	$(this).width(),
			$this=$(this);
			
		$('<input type="text" class="lt_input_text" value="'+s_val+'" />').width(width).focusout(function(){
			$(this).prev('span').show().text($(this).val());
			if($(this).val() != s_val) {
				$.ajax({
					url: '__ROOT__/Ajax/word',
					type: 'POST',
					data:{field:s_name,id:s_id,val:$(this).val()},
					dataType: 'json',
					success: function(result){

					}
				});
				//$.getJSON(settings.url, {id:s_id, field:s_name, val:$(this).val()}, function(result){
				//	if(result.status == 0) {
				//		$.zhiphp.tip({content:result.msg, icon:'error'});
				//		$('span[data-field="'+s_name+'"][data-id="'+s_id+'"]').text(s_val);
				//		return;
				//	}
				//});
			}
			$(this).remove();
		}).insertAfter($(this)).focus().select();
		$(this).hide();
		return false;
	});
});
</script>
</html>
