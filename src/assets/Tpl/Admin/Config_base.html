<include file="Public:header" />

<script type="text/javascript">
	$(document).ready(function(){
		$("#down").click(function(){
			if(confirm('消耗资源较多，请在网络环境良好时进行该操作!')){
				$("#down").hide();
				$("#loading").show();
			}else{
				return false;
			}
		});
	});
</script>
	
</head>
<form id="myform" name="myform" action="{:U('Config/base')}" enctype="multipart/form-data" method="post">

  <div class="pad-10">
    <div class="col-tab">
      <ul class="tabBut cu-li">
        <li id="tab_setting_1" class="on" onclick="SwapTab('setting','on','',2,1);">基本信息</li>
        <li id="tab_setting_2" onclick="SwapTab('setting','on','',2,2);">功能设置</li>

      </ul>
      
      <div id="div_setting_1" class="contentList pad-10">
          <table width="100%" cellpadding="2" cellspacing="1" class="table_form">
            <tr>
              <th width="100">网站名称 :</th>
              <td><input type="text" name="con[site_name]" class="input-text" size="80" value="{:C('site_name')}"></td>
            </tr>
            <tr>
              <th width="100">网站域名 :</th>
              <td><input type="text" name="con[site_domain]" class="input-text" size="80" value="{:C('site_domain')}"></td>
            </tr>
            <tr>
              <th width="100">网站路径 :</th>
              <td><input type="text" name="con[web_path]" class="input-text" size="80" value=<if condition="C('web_path') neq ''">"{:C('web_path')}"<else/>"/"</if>></td>
            </tr>
            <tr>
              <th width="100">网站标题 :</th>
              <td><input type="text" name="con[site_title]" class="input-text" size="80" value="{:C('site_title')}"></td>
            </tr>
            <tr>
              <th width="100">网站关键字 :</th>
              <td><input type="text" name="con[site_keyword]" class="input-text" size="80" value="{:C('site_keyword')}"></td>
            </tr>
            <tr>
              <th width="100">网站描述 :</th>
              <td><textarea rows="3" cols="80" name="con[site_description]">{:C('site_description')}</textarea></td>
            </tr>
            <tr>
              <th width="100">ICP证书号 :</th>
              <td><input type="text" name="con[site_icp]" id="site_icp" class="input-text" value="<php>echo strclean(C('site_icp'));</php>"></td>
            </tr>
            <tr>
              <th width="100">统计代码 :</th>
              <td><textarea rows="3" cols="80" name="con[statistics_code]" id="statistics_code"><php>echo strclean(C('statistics_code'));</php></textarea></td>
            </tr>
            <tr>
              <th width="100">网站声明 :</th>
              <td><textarea rows="3" cols="80" name="con[record]" id="record">{:C('record')}</textarea></td>
            </tr>
        </table>
      </div>
      
      <div id="div_setting_2" class="contentList pad-10 hidden">
      	<table width="100%" cellpadding="2" cellspacing="1" class="table_form">       
            <tr>
              <th width="100">网站地图(xml) :</th>
              <td>
 			  <a id="down" href="{:U('Sitemap/xml')}">生成sitemap.xml</a> 
			</td>
            </tr>
            <tr>
              <th width="100">网站地图(html) :</th>
              <td>
 			  <a id="down" href="{:U('Sitemap/html')}">生成sitemap.html</a> 
			</td>
            </tr>
         </table>      
      </div>

      <div class="bk15"></div>

      <div class="btn"><input type="submit" value="提交" name="submit" class="button" id="submit"></div>

    </div>

  </div>

</form>
</body>
</html>
