<include file="Public:header" />
<script language="javascript">var webpath="__PUBLIC__";</script>
<script type="text/javascript" src="__PUBLIC__/statics/js/common.js"></script>
<script type="text/javascript" src="__PUBLIC__/ueditor/ueditor.config.js"></script>
<script type="text/javascript" src="__PUBLIC__/ueditor/ueditor.all.min.js"></script>
<link rel="stylesheet" href="__PUBLIC__/ueditor/themes/default/css/ueditor.css"/>
<script type="text/javascript">
	$(document).ready(function(){
		$("#submit").click(function(){		
			if($("#name").val()==0){
			   alert('请填写标题');
			   return false;
			}
		});
		//编辑器
		var editor = new UE.ui.Editor({initialFrameHeight:300});
		editor.render("text"); 
	});
</script>

</head>
<form action="{:U('Case/add')}" method="post" name="myform" id="myform" enctype="multipart/form-data" style="margin-top:10px;">
  <div class="pad-10">
  <div class="col-tab">
  <ul class="tabBut cu-li">
    <li id="tab_setting_1" class="on" onclick="SwapTab('setting','on','',2,1);">基本信息</li>
    <li id="tab_setting_2" onclick="SwapTab('setting','on','',2,2);">SEO设置</li>
  </ul>
  <div id="div_setting_1" class="contentList pad-10">
    <table width="100%" cellpadding="2" cellspacing="1" class="table_form">
      <tr>
        <th width="100">案例名称 :</th>
        <td><input type="text" name="name" id="name" class="input-text" size="60" value="{$case_info.name}"></td>
      </tr>
	  <tr>
        <th width="100">URL地址 :</th>
        <td><input type="text" name="url" id="url" class="input-text" size="60" value="{$case_info.url}"></td>
      </tr>
	  <tr>
        <th width="100">标签 :</th>
        <td><input type="text" name="tags" id="tags" class="input-text" size="60" value="{$case_info.tags}"></td>
      </tr>
	  <tr>
        <th width="100">缩略图 :</th>
        <td>
            <if condition="$article['img']"><img src="<php>echo C('web_path').ltrim($article['pic'],'/');</php>" style="width:50px;height:50px;border: 1px solid #999999;padding:1px;" /><br /><br /></if>
            <input type="file" name="pic" id="pic" class="input-text" size=21 style="height:25px;"/>
		</td>
      </tr>
      <tr>
        <th>所属分类 :</th>
        <td><select name="cate_id" id="cate_id" style="width:200px;" disabled="true">
        	<option value="0">--请选择分类--</option>
			<volist name="cate_list" id="val">
			<option value="{$val.id}" <if condition="$article['cate_id'] eq $val['id']"> selected="selected" </if>>{$val.name}</option>
			</volist>
          
          </select></td>
      </tr>
      <tr>
        <th>详细内容 :</th>
        <td><textarea name="info" id="text" style="width:70%;">{$case_info.info}</textarea></td>
      </tr>
    
		<tr>
	        <th>是否删除 :</th>
	        <td>
	            <input type="radio" name="is_del" id="is_del" class="radio_style" value="1" <if condition="$case_info['is_del'] eq '1'">checked="checked"</if> > &nbsp;是&nbsp;&nbsp;&nbsp;
	        	<input type="radio" name="is_del" id="is_del" class="radio_style" value="0" <if condition="$case_info['is_del'] neq '1'">checked="checked"</if>> &nbsp;否
	        </td>
	    </tr>
      <tr><td><input type="hidden" name="id" value="{$case_info.id}" id="article_id"/></td></tr>
    </table>
  </div>

  <div id="div_setting_2" class="contentList pad-10 hidden">
    <table width="100%" cellpadding="2" cellspacing="1" class="table_form">
      <tr>
        <th width="100">Title :</th>
        <td><input type="text" name="seo_title" id="seo_title" class="input-text" size="60" value="{$article.seo_title}"></td>
      </tr>
      <tr>
        <th>Keywords :</th>
        <td><input type="text" name="seo_keys" id="seo_keys" class="input-text" size="60" value="{$article.seo_keys}"></td>
      </tr>
      <tr>
        <th>Description :</th>
        <td><textarea name="seo_desc" id="seo_desc" cols="80" rows="8">{$article.seo_desc}</textarea></td>
      </tr>
    </table>
  </div>
  <div class="bk15"></div>
  <div class="btn">
    <input type="submit" value="提交" name="submit" class="button" id="submit">
  </div>

</div>
</div>
</form>
</body>
</html>
