<include file="Public:header" />

<script type="text/javascript">
	function status(id,type,value){
	    $.get("{:U('Wxwin/status')}", { id: id, type: type }, function(data){
			$("#"+type+"_"+id+" img").attr('src', '__PUBLIC__/statics/images/status_'+data.data+'.gif')
		},"json"); 
	}
</script>

</head>
<div class="pad-lr-10" >
    <form id="myform" name="myform" action="{:U('Wxwin/delete')}" method="post" >
    <div class="table-list" style="margin-top:10px;">

    <table width="100%" cellspacing="0">
        <thead>
            <tr>
				<th width="5%"><input type="checkbox" value="" id="check_box" onclick="selectall('id[]');"></th>
              	<th width="50">活动标识</th>
				<th width="150">活动日期</th>
				<th align="left" width="200">奖品</th>	
				<th width="100">排序值</th>	
				<th width="30">多栏</th>			
                <th width="150">操作</th>
            </tr>
        </thead>
    	<tbody>
        <volist name="list" id='val'>
		<tr>
			<td align="center"><input type="checkbox" value="{$val.id}" name="id[]"></td>
			<td align="center">{$val.win_date}</td>
			<td align="center">{$val.win_date|date="Y-m-d",###}</td>
            <td align="left">{$val.prize}</td>
			<td align="center"><input type="text" class="input-text-c input-text" value="{$val.ordid}" size="4" name="orders[{$val.id}]"></td>
			<td align="center" onclick="status({$val.id},'status')" id="status_{$val.id}"><img src="__PUBLIC__/statics/images/status_{$val.status}.gif" /></td>
			<td align="center">
 				<a class="blue" href="{:U('Wxwin/excelIn',array('id'=>$val['id']))}">导入名单</a>
				<a class="blue" href="http://m.33ly.com/Weixin/prize/id/{$val.win_date}" target="_blank">查看</a>
			</td>
        </tr>
        </volist>
    	</tbody>
    </table>

    <div class="btn">
	<input type="submit" class="button" name="add" onclick="document.myform.action='{:U('Wxwin/add')}'" value="新增" />
    <input type="submit" class="button" name="submit" value="删除" onclick="return check();"/>
	<input type="submit" class="button" name="order" onclick="document.myform.action='{:U('Wxwin/order')}'" value="排序" />
    </div>

    </div>
    </form>
</div>
</body>
</html>
