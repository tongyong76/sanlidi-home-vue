<include file="Public:header" />
<script language="javascript">var webpath="__PUBLIC__";</script>
<script type="text/javascript" src="__PUBLIC__/statics/js/common.js"></script>
<script type="text/javascript" src="__PUBLIC__/ueditor/ueditor.config.js"></script>
<script type="text/javascript" src="__PUBLIC__/ueditor/ueditor.all.min.js"></script>
<link rel="stylesheet" href="__PUBLIC__/ueditor/themes/default/css/ueditor.css"/>
<script type="text/javascript">
	$(document).ready(function(){
		$("#submit").click(function(){
			if($("#name").val()==0){
			   alert('请填写资讯分类');
			   return false;
			}
		});
	});
</script>

</head>
<body>
<div class="pad_10">
<form action="{:U('Wxwin/add')}" method="post" name="myform" id="myform" enctype="multipart/form-data" style="margin-top:10px;">
  <div class="pad-10">
  <div class="col-tab">
  <ul class="tabBut cu-li">
    <li id="tab_setting_1" class="on" onclick="SwapTab('setting','on','',1,1);">基本信息</li>
  </ul>
  <div id="div_setting_1" class="contentList pad-10">
    <table width="100%" cellpadding="2" cellspacing="1" class="table_form">
	<tr>
	  <th width="100">活动日期 :</th>
	  <td>
		<input type="text" name="win_date" id="win_date" class="date" value="" readonly="true">
		<script language="javascript" type="text/javascript">
			Calendar.setup({
				inputField     :    "win_date",
				ifFormat       :    "%Y-%m-%d",
				showsTime      :    'true',
				timeFormat     :    "24"
			});
        </script>
	  </td>
	</tr>
	<tr>
	  <th width="100">奖品 :</th>
	  <td><input type="text" name="prize" id="prize" class="input-text" value=""></td>
	</tr>
	<tr>
	  <th width="100">中奖名单 :</th>
	  <td><textarea name="uname[]" id="uname" cols="80" rows="8" style="resize:none;"></textarea>(名单用"|"符号隔开)</td>
	</tr>
	</table>
  </div>
  <div class="bk15"></div>
  <div class="btn">
    <input type="submit" value="提交" name="submit" class="button" id="submit">
  </div>

</div>
</div>
</form>
</div>
</body>
</html>
