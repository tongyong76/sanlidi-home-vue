<include file="Public:header" />
<script language="javascript">var webpath="__PUBLIC__";</script>
<script type="text/javascript" src="__PUBLIC__/statics/js/common.js"></script>
<script type="text/javascript" src="__PUBLIC__/ueditor/ueditor.config.js"></script>
<script type="text/javascript" src="__PUBLIC__/ueditor/ueditor.all.js"></script>
<link rel="stylesheet" href="__PUBLIC__/ueditor/themes/default/css/ueditor.css"/>
<script type="text/javascript">
	$(document).ready(function(){
		$("#submit").click(function(){		
			if($("#title").val()==0){
			   alert('请填写标题');
			   return false;
			}
		});
		//编辑器
		/*var editor = new UE.ui.Editor({initialFrameHeight:300});
		editor.render("content"); */
		
		var editor = UE.getEditor('content', {toolbars:[['source', 'undo', 'bold', 'italic','link', 'unlink', 'formatmatch', 'underline', 'forecolor', 'backcolor', 'fontfamily', 'fontsize', 'insertorderedlist', 'insertunorderedlist', 'selectall', 'cleardoc','justifyleft', 'justifycenter', 'justifyright', 'justifyjustify','inserttable','insertimage', 'template']],initialFrameHeight:300,pasteplain:false});
		
	});
</script>

</head>
<form action="{:U('Xiha/edit')}" method="post" name="myform" id="myform" enctype="multipart/form-data" style="margin-top:10px;">
  <div class="pad-10">
  <div class="col-tab">
  <ul class="tabBut cu-li">
    <li id="tab_setting_1" class="on" onclick="SwapTab('setting','on','',1,1);">基本信息</li>
  </ul>
  <div id="div_setting_1" class="contentList pad-10">
    <table width="100%" cellpadding="2" cellspacing="1" class="table_form">
      <tr>
        <th width="100">标题名称 :</th>
        <td><input type="text" name="title" id="title" class="input-text" size="60" value="{$info.title}"></td>
      </tr>
	  <tr>
        <th width="100">缩略图 :</th>
        <td>
			<if condition="$info['img']"><img src="<php>echo C('web_path').ltrim($info['img'],'/');</php>" style="width:50px;height:50px;border: 1px solid #999999;padding:1px;" /><br /><br /></if>
            <input type="file" name="img" id="img" class="input-text" size=21 style="height:25px;"/>		
		</td>
      </tr>
      <tr>
        <th>详细内容 :</th>
        <td><script type="text/plain" id="content" name="info" style="width:70%;">{$info.info}</script></td>
      </tr>
    
		<tr>
	        <th>是否删除 :</th>
	        <td>
	            <input type="radio" name="is_del" id="is_del" class="radio_style" value="1" <if condition="$info['is_del'] eq '1'">checked="checked"</if> > &nbsp;是&nbsp;&nbsp;&nbsp;
	        	<input type="radio" name="is_del" id="is_del" class="radio_style" value="0" <if condition="$info['is_del'] neq '1'">checked="checked"</if>> &nbsp;否
	        </td>
	    </tr>
      <tr><td><input type="hidden" name="id" value="{$info.id}" id="info_id"/></td></tr>
    </table>
  </div>

  <div class="bk15"></div>
  <div class="btn">
    <input type="submit" value="提交" name="submit" class="button" id="submit">
  </div>

</div>
</div>
</form>
</body>
</html>
