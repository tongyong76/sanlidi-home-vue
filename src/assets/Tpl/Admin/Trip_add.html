<include file="Public:header" />
<script language="javascript">var webpath="__PUBLIC__";</script>
<script type="text/javascript" src="__PUBLIC__/ueditor/ueditor.config.js"></script>
<script type="text/javascript" src="__PUBLIC__/ueditor/ueditor.all.min.js"></script>
<link rel="stylesheet" href="__PUBLIC__/ueditor/themes/default/css/ueditor.css"/>
<script type="text/javascript">
	$(document).ready(function(){
		$("#submit").click(function(){		
			if($("#name").val()==0){
			   alert('请填写名称');
			   return false;
			}
		});
		//编辑器
		var editor = new UE.ui.Editor({initialFrameHeight:300});
		editor.render("text"); 
	});
</script>
</head>
<body>
<form action="{:u('Trip/add')}" method="POST" name="myform" id="myform" enctype="multipart/form-data" style="margin-top:10px;">
  <div class="pad-10">
  <div class="col-tab">
  <ul class="tabBut cu-li">
    <li id="tab_setting_1" class="on" onclick="SwapTab('setting','on','',1,1);">基本信息</li>
  </ul>
  <div id="div_setting_1" class="contentList pad-10">
    <table width="100%" cellpadding="2" cellspacing="1" class="table_form">
	  <tr>
        <th width="100"></th>
        <td>第&nbsp;<input type="text" name="ordid" class="input-text" size="2" value="" >天</td>
      </tr>
	  <tr>
        <th width="100">名称 :</th>
        <td><input type="text" name="name" class="input-text" size="60" value="" ><b style="color:red;font-weight:bold;">填城市或国家，不是填写景点。航空公司代号尽量用中文描述</b></td>
      </tr>
	  <tr>
        <th width="100">餐饮 :</th>
        <td>
			<input type="checkbox" value="1" name="dinner[]">&nbsp;早餐
			<input type="checkbox" value="2" name="dinner[]">&nbsp;午餐
			<input type="checkbox" value="3" name="dinner[]">&nbsp;晚餐
		</td>
      </tr>
	  <tr>
        <th width="100">住宿 :</th>
        <td><input type="text" name="hotel" class="input-text" size="60" value="" ><b style="color:red;font-weight:bold;">尽量具体，少用"或同级"</b></td>
      </tr>
	  <tr>
        <th width="100">景点 :</th>
        <td>
			<input type="text" name="scene" class="input-text" size="60" value="{$info.scene}" >
			<input type="button" name="getScene" value="获取相关景点" >
		</td>
      </tr>
	  <tr>
		<th>行程详情 :</th>
		<td>
			<p style="color:red;font-weight:bold;">1. 描述不超过4行</p>
			<p style="color:red;font-weight:bold;">2. 第1天开头：“苏州各县市集合，车赴XX机场，乘飞机前往XX”</p>
			<p style="color:red;font-weight:bold;">3. 最后一天结尾：“飞回XX，专车送至指定点，结束愉快的行程，返回温馨的家”</p>
			<textarea style="width:70%;" name="info" id="text"></textarea>
		</td>
	  </tr> 
	  <input type="hidden" name="pid" value="{$pid}" >
    </table>
  </div>
  
  <div class="bk15"></div>
  <div class="btn">
    <input type="submit" onclick="disable()" value="提交" name="submit" class="button" id="submit">
  </div>

</div>
</div>
</form>
<script type="text/javascript">
function delHtmlTag(str){
	return str.replace(/<[^>]+>/g,"");//去掉所有的html标记
}

function disable(){
	if($('input').attr("disabled")==true || $('input').attr("disabled")==true){
		$('input').removeAttr('disabled');
		$('select').removeAttr('disabled');
	}
}

$('input[name="getScene"]').click(function(){		
	var srcData = $('textarea').val();
	srcData = delHtmlTag(srcData);
	$.ajax({
		url: '__ROOT__/Tour/getscene',
		type: 'POST',
		data:{srcData:srcData},
		dataType: 'json',
		success: function(result){
			if(result.status == 1){
				$('input[name="scene"]').val(result.data);
			}else{
				alert('失败');
			}
		}
	});
});
</script>
</body>
</html>
