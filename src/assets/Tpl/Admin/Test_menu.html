			$(this).find('a').addClass('cur');
		})
	});
</script>

		<dd>
			<ul id="{$vo.cname}" class="none">
				<volist name="vo.son" id="voo">
				<li><a href="__GROUP__{$voo.url}" target="main">{$voo.name}</a></li>
				</volist>
			</ul>
		</dd>
	</dl>
	</volist>
