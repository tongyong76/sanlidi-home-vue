<include file="Public:header" />

<script type="text/javascript">
	$(document).ready(function(){
		$(".preview").preview();
	});
	
	function status(id,type){
		$.get("{:u('Shopview/status')}", { id: id, type: type }, function(data){
			$("#"+type+"_"+id+" img").attr('src','__PUBLIC__/statics/images/status_'+data+'.gif')
		},"json"); 
	}
</script>

</head>
<body>
<div class="pad-10" >
    <form name="searchform" action="{:U('Shopview/index')}" method="post" >
    <input name="a" type="hidden" value="index">
    <input name="m" type="hidden" value="Shopview">
    <input name="g" type="hidden" value="Admin">
    <table width="100%" cellspacing="0" class="search-form">
        <tbody>
            <tr>
            <td>
            <div class="explain-col">
            	关键字 :
                <input name="keyword" type="text" class="input-text" size="25" value="{$keyword}" />
                <input type="submit" name="search" class="button" value="搜索" />
        	</div>
            </td>
            </tr>
        </tbody>
    </table>
    </form>

    <form id="myform" name="myform" action="{:u('Shopview/delete')}" method="post">
    <div class="table-list">
    <table width="100%" cellspacing="0">
        <thead>
            <tr>
                <th width="5%">序号</th>
                <th width="1%"><input type="checkbox" value="" id="check_box" onclick="selectall('id[]');"></th>
				<th width=30>排序值</th>
                <th width=60>缩略图</th>
                <th width=200 align="left">产品名称</th>
				<th width=30>有效期</th>
				<th width=30>状态</th>
                <th width=120>操作</th>
            </tr>
        </thead>
    	<tbody>
        <volist name="hotelList" id="val" >
        <tr>
        	<td align="center">{$val.key}</td>
            <td align="center"><input type="checkbox" value="{$val.shopview_id}" name="id[]"></td>
			<td align="center"><input type="text" class="input-text-c input-text" value="{$val.ordid}" size="4" name="orders[{$val.shopview_id}]" /></td>
            <td align="center"><img src="__ROOT__{$val.shopview_imgurl}" width="40px" height="40px" class="preview" bimg="__ROOT__{$val.shopview_imgurl}" title="<php>if(strpos($val['shopview_imgurl'],'http') === false){echo '本地图片';}else{echo '远程图片';}</php>" /></td>
			<td align="left"><a href="{:u('Shopview/edit',array('shopview_id'=>$val['shopview_id']))}">{$val.shopview_name}</a></td>   
            <if condition="$val['exp_time'] lt time()">
			<td align="center" style="color:#ff0000">{$val.exp_time|date='Y-m-d',###}</td>
			<else/>
			<td align="center">{$val.exp_time|date='Y-m-d',###}</td>
			</if>
			
			<td align="center" onclick="status({$val.shopview_id},'status')" id="status_{$val.shopview_id}"><img src="__PUBLIC__/statics/images/status_{$val.status}.gif" /></td>
			<td align="center"><a class="blue" href="{:u('Shopview/edit',array('shopview_id'=>$val['shopview_id']))}">编辑</a></td>
        </tr>
        </volist>
    	</tbody>
    </table>

    <div class="btn">
    	<label for="check_box" style="float:left;">全选/取消</label>
		<input type="submit" class="button" name="add" onclick="document.myform.action='{:U('Shopview/add')}'" value="新增" style="margin:0 0px 0 10px;"/>
    	<input type="submit" class="button" name="submit" value="删除" style="margin:0 10px 0 10px;" onclick="return check();"/>
    	<input type="submit" class="button" name="order" onclick="document.myform.action='{:U('Shopview/order')}'" value="排序" style="margin:0 10px 0 0px;"/>
    	<div id="pages">{$page}</div>
    </div>

    </div>
    </form>
</div>
</body>
<script type="text/javascript">
$(function(){

});
</script>
</html>
