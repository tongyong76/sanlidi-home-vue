<include file="Public:header" />
<script language="javascript">var webpath="__PUBLIC__";</script>
<script type="text/javascript" src="__PUBLIC__/statics/js/common.js"></script>
<script type="text/javascript" src="__PUBLIC__/ueditor/ueditor.config.js"></script>
<script type="text/javascript" src="__PUBLIC__/ueditor/ueditor.all.min.js"></script>
<link rel="stylesheet" href="__PUBLIC__/ueditor/themes/default/css/ueditor.css"/>
<script type="text/javascript">
	$(document).ready(function(){
		$("#submit").click(function(){
			if($("#name").val()==0){
			   alert('请填写资讯分类');
			   return false;
			}
		});
	});
</script>

</head>
<div class="pad_10">
<form action="{:U('Sldwxmenu/edit')}" method="post" name="myform" id="myform" enctype="multipart/form-data" style="margin-top:10px;">
  <div class="pad-10">
  <div class="col-tab">
  <ul class="tabBut cu-li">
    <li id="tab_setting_1" class="on" onclick="SwapTab('setting','on','',1,1);">基本信息</li>
  </ul>
  <div id="div_setting_1" class="contentList pad-10">
    <table width="100%" cellpadding="2" cellspacing="1" class="table_form">
	<tr>
      <th width="100">模式 :</th>
      <td>
		<select name="type" id="type" style="width:150px;">
			<option value="click" <if condition="$info['type'] eq 'click'">selected="selected"</if>>消息模式</option>
			<option value="view" <if condition="$info['type'] eq 'view'">selected="selected"</if>>链接模式</option>
		</select>
	  </td>
    </tr>
	<tr class="view" <if condition="$info['type'] eq 'click'">style="display:none;"</if>>
      <th width="100">跳转链接 :</th>
      <td><input type="text" name="url" id="url" class="input-text long_text" style="width:450px;" value="{$info.url}"></td>
    </tr>
	<input type="hidden" name="id" value="{$info.id}">
	<input type="hidden" name="pid" value="{$info.pid}">
</table>
  </div>

  <div class="bk15"></div>
  <div class="btn">
    <input type="submit" value="提交" name="submit" class="button" id="submit">
  </div>

</div>
</div>
</form>
</div>
</body>
<script type="text/javascript">
$(function(){
	$("#type").change(function(){
		$('input[name="url"]').val('');
		if($("#type").val() == 'click'){
			$('.table_form .view').css('display','none');
		}
		if($("#type").val() == 'view'){
			$('.table_form .view').css('display','');
		}
	});
});
</script>
</html>
