<include file="Public:header" />

<script type="text/javascript">
	function status(id,type,value){
	    $.get("{:U('ShipCate/status')}", { id: id, type: type }, function(data){
			$("#"+type+"_"+id+" img").attr('src', '__ROOT__/Uploads/images/status_'+data.data+'.gif')
		},"json"); 
	}
</script>

</head>
<div class="pad-lr-10" >
    <form id="myform" name="myform" action="{:U('ShipCate/delete')}" method="post" >
    <div class="table-list" style="margin-top:10px;">

    <table width="100%" cellspacing="0">
        <thead>
            <tr>
                <th width="5%"><input type="checkbox" value="" id="check_box" onclick="selectall('id[]');"></th>
              	<th width="100">排序值</th>
				<th align="left">分类名称</th>                         	
                <th width="150">操作</th>
            </tr>
        </thead>
    	<tbody>
        <volist name="cates_list" id='val'>
		<tr id="{$val.id}" data-floor="{$val.floor}" class="sub_{$val.pid} level_{$val.floor}" <if condition="$val[floor] gt 1">style="display:none;"</if>>
            <td align="center"><input type="checkbox" value="{$val.id}" name="id[]"></td>
			<td align="center"><input type="text" class="input-text-c input-text" value="{$val.ordid}" size="4" name="orders[{$val.id}]"></td>
            <td align="left">{$val.name}</td>
            
            <td align="center">
 				<a class="blue" href="{:U('ShipCate/edit',array('id'=>$val['id']))}">编辑</a>
			</td>
        </tr>
        </volist>
    	</tbody>
    </table>

    <div class="btn">
    <label for="check_box">全选/取消</label>
	<input type="submit" class="button" name="add" onclick="document.myform.action='{:U('ShipCate/add')}'" value="新增" />
    <input type="submit" class="button" name="submit" value="删除" style="margin:0px 10px;" onclick="return check();"/>
    <input type="submit" class="button" name="order" onclick="document.myform.action='{:U('ShipCate/order')}'" value="排序" />
    </div>

    </div>
    </form>
</div>
<script type="text/javascript">
	function cateZkAll(){
		$('table tbody tr').show();
		$('table tbody tr').find('td:eq(2)').find('img').attr('src','/33ly/Public/statics/images/tv-collapsable.gif');
	}
	
	function cateZdAll(){
		$('table tbody tr').hide();
		$('table tbody tr').find('td:eq(2)').find('img').attr('src','/33ly/Public/statics/images/tv-expandable.gif');
		$('table tbody .sub_0').show();
	}
</script>
</body>
</html>
