<include file="Public:header" />
<script language="javascript">var webpath="__PUBLIC__";</script>
<script type="text/javascript" src="__PUBLIC__/statics/js/common.js"></script>
<script type="text/javascript" src="__PUBLIC__/ueditor/ueditor.config.js"></script>
<script type="text/javascript" src="__PUBLIC__/ueditor/ueditor.all.min.js"></script>
<link rel="stylesheet" href="__PUBLIC__/ueditor/themes/default/css/ueditor.css"/>

</head>
<div class="pad_10">
<form action="{:U('Wxauto/edit')}" method="post" name="myform" id="myform" enctype="multipart/form-data" style="margin-top:10px;">
  <div class="pad-10">
  <div class="col-tab">
  <ul class="tabBut cu-li">
    <li id="tab_setting_1" class="on" onclick="SwapTab('setting','on','',1,1);">基本信息</li>
  </ul>
  <div id="div_setting_1" class="contentList pad-10">
    <table width="100%" cellpadding="2" cellspacing="1" class="table_form">
	<tr>
      <th width="100">关键词 :</th>
      <td><input type="text" name="keyword" id="keyword" class="input-text" value="{$info.keyword}"></td>
    </tr>
    <tr>
      <th width="100">标题 :</th>
      <td><input type="text" name="cname" id="cname" class="input-text" value="{$info.cname}"></td>
    </tr>
	<tr>
      <th width="100">描述 :</th>
      <td><input type="text" name="cdes" id="cdes" class="input-text long_text" value="{$info.cdes}"></td>
    </tr>
	<tr>
      	<th>图片 :</th>
      	<td>
			<img height="100" src="__ROOT__{$info.cimg}" />&nbsp;&nbsp;<br /><br />
            <input type="file" name="cimg" class="input-text" size=21 style="height:25px;"/>
        </td>
      </tr>
	<tr>
      <th width="100">链接 :</th>
      <td><input type="text" name="curl" id="curl" class="input-text long_text" value="{$info.curl}"></td>
    </tr>
	<input type="hidden" name="id" value="{$info.id}">
</table>
  </div>

  <div class="bk15"></div>
  <div class="btn">
    <input type="submit" value="提交" name="submit" class="button" id="submit">
  </div>

</div>
</div>
</form>
</div>
</body>
</html>
