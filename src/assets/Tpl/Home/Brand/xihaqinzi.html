<script type="text/javascript">
//初始化归零
$('input[name="days"]').val('');
$('input[name="price"]').val('');

$(document).ready(function(){
	$('.searchNav a').click(function(){
		var days = $('input[name="days"]').val();
		var price = $('input[name="price"]').val();
		var pinyin = $("input[name='pinyin']").val();
		var field = $(this).attr('data-field');
		var value = $(this).attr('data-value');
		if(field == 'days'){
			days = value;
			$('input[name="days"]').val(days);
		}
		if(field == 'price'){
			price = value;
			$('input[name="price"]').val(price);
		}
		$(this).parent().parent().find('a').removeClass('cur');
		$(this).addClass('cur');
		$.ajax({
			url: '__ROOT__/Ajax/tourIndex',
			type: 'POST',
			data:{days:days,price:price,pinyin:pinyin},
			dataType: 'html',
			success: function(result){
				$('.search_route_list').children().remove();
				$('.search_route_list').append(result);
				$('.s_r_list li').removeClass('lihover');
				$('.s_r_list li').hover(function(){
					$(this).addClass('lihover');	
				},function(){
					$('.s_r_list li').removeClass('lihover');	
				});	
				if(result.status == 1){
					$('.s_r_list li').remove();
					$('.pagination').remove();
					$('.s_r_list').append(result.data);
				}
			}
		});
			
	});
});
</script>
