<ul class="s_r_list">
	<volist name="list" id="vo">
	<li>
		<div class="routeinfo clearfix">
			<div class="Limgbox fl">
				<a href="__ROOT__/youlun/xianlu-{$vo.id}.html" target="_blank"><img src="__ROOT__{$vo.imgurl}"></a>
			</div>
			<if condition="$vo['is_owner']"><div class="zzt"><img width="80" height="80" src="../Public/images/dqc.png" /></div></if>
			<div class="Cinfo fl">
				<div class="Cinfo_title"><a href="__ROOT__/youlun/xianlu-{$vo.id}.html" target="_blank"><{$vo.name}>{$vo.subname}</a></div>
				<div class="Cinfo_tag">
					<if condition="$vo['series_id']"><span class="series{$vo.series_id}">{:C('series.'.$vo['series_id'])}</span></if>
					<if condition="$vo['brand_id']"><span class="brand{$vo.brand_id}">{:C('brand.'.$vo['brand_id'])}</span></if>
					<volist name="vo.switch" id="voo">
					<span class="switch{$voo}">{:C('switch.'.$voo)}</span>
					</volist>
				</div>
				<div class="Cinfo_des">{$vo.binfo}</div>
				<div class="Cinfo_data mT20">行程天数：<span class="day_num">{$vo.days}</span>天</div>
				<div class="Cinfo_data">出发日期：<span class="data_time"><if condition="$vo['start_time']">{$vo.start_time|date='Y-m-d',###}<else/>最近无行程</if></span></div>
			</div>
			<div class="Rprice fl">
				<div class="now_price">￥<span>{$vo.minprice|isNull=###}</span>起</div>
				<div class="ticket mT10"><a href="__ROOT__/youlun/xianlu-{$vo.id}.html" target="_blank" onMouseOver="this.className='ticket_move'" onMouseOut="this.className=''">查看详情</a></div>
			</div>
		</div>
	</li>
	</volist>
</ul>
<div class="pagination">
	<div class="paging fr" id="page">{$page}</div>
</div>
