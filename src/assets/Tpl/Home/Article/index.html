<!DOCTYPE HTML>
<html>
<head>
<meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
<title>{$id|getNameById=###,"article_cate"}-苏州青旅33ly.com</title>

<link type="text/css" rel="stylesheet" href="../Public/css/reset.css">
<link type="text/css" rel="stylesheet" href="../Public/css/style.css">
<script type="text/javascript" src="../Public/js/jquery-1.11.1.min.js"></script>

<body>
<include file="Public:header"/>
<!--头部结束-->
<div class="wrap">
	<div class="inside_wrap">

							<volist name="tj" id="vo">

								<div class="twi_left fl"><a href="__ROOT__/{$vo.pinyin}/xianlu-{$vo.id}.html"><img src="__ROOT__{$vo.imgurl}"></a><span></span></div>
								<div class="twi_right fl">
									<div class="twi_title"><a href="__ROOT__/{$vo.pinyin}/xianlu-{$vo.id}.html">{$vo.name}</a></div>

							</li>
							</volist>
						</ul>
					</div>
				</div>

					<div class="x_w_title"><span>三三新闻</span><a class="fr" href="{:U('Article/index',array('id'=>1))}" target="_blank">更多>></a></div>
					<div class="x_w_item">
						<ul>
							<volist name="arcList" id="vo">
							<li class="clearfix">
								<div class="xwi_left fl"><a href="{:U('Article/detail',array('id'=>$vo['id']))}" target="_blank">{$vo.title|msubstr=###,'18'}</a></div>
								<div class="xwi_right fr">{$vo.add_time|date="y.m.d",###}</div>
							</li>
							</volist>
						</ul>
					</div>
				</div>
                <div class="cLeft_adList">
                	<ul>
                    	<li><a href="{$ad.zbzx1.link}"><img src="{$ad.zbzx1.imgurl}"></a></li>

                        <li><a href="{$ad.zbzx3.link}"><img src="{$ad.zbzx3.imgurl}"></a></li>
                    </ul>
                </div>                
                
            </div>

                <div class="article_list clearfix">
                	<ul>
						<volist name="arcList" id="vo">
                    	<li>
                        	<span class="a_info"><a href="{:U('Article/detail',array('id'=>$vo['id']))}">{$vo.title}</a></span>
                            <span class="a_date">{$vo.add_time|date="Y-m-d",###}</span>
                        </li>
						</volist>
                    </ul>
                    <div class="pagination">
                        <div class="paging fr">
                            {$page}
