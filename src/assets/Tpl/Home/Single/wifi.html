<script type="text/javascript">
function checkForm(){
	var ntime = $('input[name="time_now"]').val();
	var stime = $('input[name="time_start"]').val();
	var etime = $('input[name="time_end"]').val();
	var ptime = $('input[name="time_pick"]').val();

	if(stime){
		if(stime < ntime){
			alert('请选择正确的出发日期！');
			$('input[name="time_start"]').val("");
		}
	}
	if(stime && etime){
		if(etime < stime){
			alert('请选择正确的结束日期！');
			$('input[name="time_end"]').val("");
			$('input[name="days"]').val("");
		}else{
			sday = new Date(stime);
			eday = new Date(etime);
			days = Math.floor((eday-sday)/(24*60*60*1000))
			$('input[name="days"]').val(days + 1);
		}
	}
	if(ptime){
		if(ptime < ntime){
			alert('请选择正确的自取日期！');
			$('input[name="time_pick"]').val("");
		}
	}
	if(ptime && stime){
		if(stime < ptime + 2){
			alert('自取时间需要至少提前1天！');
			$('input[name="time_pick"]').val("");
		}
	}
}
Calendar.setup({
	inputField     :    "time_pick",
	ifFormat       :    "%Y-%m-%d",
	timeFormat     :    "24",
	onUpdate   :    function(){
		checkForm();
	}
});
Calendar.setup({
	inputField     :    "time_start",
	ifFormat       :    "%Y-%m-%d",
	timeFormat     :    "24",
	onUpdate   :    function(){
		checkForm();
	}
});
Calendar.setup({
	inputField     :    "time_end",
	ifFormat       :    "%Y-%m-%d",
	timeFormat     :    "24",
	onUpdate   :    function(){
		checkForm();
	}
});
function formCheck(){
	var country = $('select[name="country"]').val();
	var shop = $('select[name="shop"]').val();
	var days = $('input[name="days"]').val();
	var stime = $('input[name="time_start"]').val();
	var etime = $('input[name="time_end"]').val();
	var ptime = $('input[name="time_pick"]').val();
	if(country && shop && days && stime && etime && ptime){
		alert('true');
		return true;
	}else{
		alert("带*号的项目必须填写！");
		return false;
	}
}
$(function(){

});
</script>
