<!DOCTYPE HTML>
<html>
<head>
<meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
<title>会员登录_免费注册_三三旅游_苏州青旅33ly.com</title>
<meta name="keywords" content="">
<meta name="description" content="三三旅游网：苏州旅游直营连锁第一品牌，致力于为大众带来及时、专业、全面、无忧的旅游服务，为您提供出境游、国内游、周边游、团队旅游等优质线路预订。">
<link type="text/css" rel="stylesheet" href="../Public/css/reset.css">
<link type="text/css" rel="stylesheet" href="../Public/css/ral.css">
<script type="text/javascript" src="../Public/js/jquery-1.11.1.min.js"></script>
<include file="Public:statistics"/>
</head>
<body>
<include file="Public:ralheader" />
<div class="ral_box clearfix">
	<div class="ral_login">
		<div class="ral_bgimg"><img src="../Public/images/ral_bg2.jpg" /></div>
		<div class="ral_form">
			<h2>登录三三旅游</h2>
			<form id="loginForm" method="post" action="" class="clearfix">
				<div class="login_box"><input id="phone" class="text hint user_name" type="text" defaultValue="请输入手机号码" name="phone"></input></div>
				<div class="login_box">
                	<input id="password" class="text hint user_password" type="password" name="password"></input>
                	<label for="user_password" class="user_pass">请输入密码</label>
                </div>
                
                
                <div class="forget_password clearfix">
                	<span class="fl"><input type="checkbox" value="1" name="remember" class="check" checked="checked"/></span>
					<span class="fl">下次自动登录</span>
					<span class="fr"><a class="fp" href="{:U('User/register')}">立即注册</a><a class="fp" href="{:U('User/findpwd')}">忘记密码？</a></span>	
                </div>
				
				<input type="submit" name="submit" class="loginBtn" value="立即登录" class="submit" onMouseOver="this.className='active'" onMouseOut="this.className='loginBtn'"/>
			</form>
		</div>
	<div>
</div>
<include file="Public:ralfooter" />
<script type="text/javascript">
$(function(){
	
	$(".hint").each(function(){
		$(this).val($(this).attr('defaultValue'));	
	});
	$(".hint").focus(function(){
		$(this).css('color','#333');
		if($(this).val() == $(this).attr('defaultValue')){
			$(this).css('color','#333');
			$(this).val('').removeClass('hint');				
		};
	});
	$(".hint").blur(function(){
		if($(this).val() == ''){
			$(this).css('color','#c8c8c8');
			$(this).addClass('hint').val($(this).attr('defaultValue'));			
		};
	});
	
	//$('#J_captcha_img').click(function(){
    //    var timenow = new Date().getTime(),
    //        url = $(this).attr('data-url').replace(/js_rand/g,timenow);				
    //    $(this).attr("src", url);
    //});
	$('#J_captcha_change').click(function(){
        //$('#J_captcha_img').trigger('click');
		var time = new Date().getTime();
		$('#J_captcha_img').attr('src','__ROOT__/User/verify/' + time);		
    });
	/*$("#phone").focus(function(){
		
		$(this).css('color','#333');	
	});
	$("#password").focus(function(){
		$(this).css('color','#333');	
	});*/
	//验证手机
	$('.user_pass').click(function(){
		$(this).hide();	
		$('#password').focus();
	});
	
	$("#phone").blur(function(){
		var check_phone_exist=$("#check_phone_exist").val();
		$(".err_phone").removeClass("nomal");
		var phone=$.trim($("#phone").val());
		if(phone==""){
			$(".err_phone").addClass("error").removeClass("correct").html("请填写手机！");
		}else{
			var uanmebool=/^(13[0-9]|15[0|3|6|7|8|9]|18[8|9]|18[0-9]|147|17[6-8])\d{8}$/.test(phone);
			if(!uanmebool){
				$(".err_phone").addClass("error").removeClass("correct").html("请填写正确的手机号码！");
			}else{
				$.post(check_phone_exist,{phone:phone},function(data){
					if(data=="phoneExist"){
						$(".err_phone").addClass("error").removeClass("correct").html("该手机号码已存在！");
					}else{
						$(".err_phone").addClass("correct").removeClass("error").html("&nbsp;");
					}
				});
			}
		}
	});
	$("#password").focus(function(){
		if($(this).val() == ''){
			$('.user_pass').hide();	
		}	
	});
	$("#password").blur(function(){
		if($(this).val() == ''){
			$('.user_pass').show();	
		}
		$(".err_password").removeClass("nomal");
		var pwd=$.trim($(this).val());
		if(pwd==""){
			$(".err_password").addClass("error").removeClass("correct").html("请输入密码！");
		}else{
			var pwdbool=/^[0-9a-zA-Z]{6,24}$/.test(pwd);
			if(!pwdbool){
				$(".err_password").addClass("error").removeClass("correct").html("请输入6-24位英文和数字组合!");
			}else{
				$(".err_password").addClass("correct").removeClass("error").html("&nbsp;");
			}
			
		}
	});
	$("#repassword").blur(function(){
		$(".err_rstpassword").removeClass("nomal");
		var pwd=$.trim($("#password").val());
		var pwdSure=$("#repassword").val();
		if(pwdSure==''){
			$(".err_rstpassword").addClass("error").removeClass("correct").html("请重复输入一次密码");
		}else if(pwdSure!=pwd){
			$(".err_rstpassword").addClass("error").removeClass("correct").html("两次输入密码不同!");
		}else{
			$(".err_rstpassword").addClass("correct").removeClass("error").html("&nbsp;");
		}
	});
	//验证验证码
	$("#verification").blur(function(){
		$(".err_check").removeClass("nomal");
		var verify_post_action=$(this).attr("verify_post_action");
		var verification=$.trim($(this).val());
		if(verification==''){
			$(".err_check").addClass("error").removeClass("correct").html("请输入验证码！");
			return false;
		}
		$.post(verify_post_action,{verification:verification},function(data){
			if(data=="true"){
				$(".err_check").addClass("correct").removeClass("error").html("&nbsp;");
			}else if(data=="false"){
				$(".err_check").addClass("error").removeClass("correct").html("验证码输入不正确的！");
			}
		});
	});
	$("#registerbtn").click(function(){
		if($(".err_phone").html()=='&nbsp;' && $(".err_password").html()=='&nbsp;' && $(".err_rstpassword").html()=='&nbsp;' && $(".err_check").html()=='&nbsp;'){
			return true;
		}else{
			return false;
		}
	});
});
</script>
</body>
</html>
