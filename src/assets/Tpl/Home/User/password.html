<!DOCTYPE HTML>
<html>
<head>
<meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
<title>个人中心_密码修改_苏州青旅33ly.com</title>
<meta name="keywords" content="">
<meta name="description" content="">
<link type="text/css" rel="stylesheet" href="../Public/css/reset.css">
<link type="text/css" rel="stylesheet" href="../Public/css/style.css">
<script type="text/javascript" src="../Public/js/jquery-1.11.1.min.js"></script>
<script type="text/javascript" src="../Public/js/common.js"></script>
<script type="text/javascript" src="../Public/js/user.js"></script>
<include file="Public:statistics"/>
</head>
<body>
<include file="Public:header" />
<!--头部结束-->
<div class="wrap">
	<div class="inside_wrap">
    	<div class="search_nav"><a href="index.html">首页</a>>><span>会员中心</span></div>
        <div class="mysan">我的</div>
        <div class="cont clearfix">
        	<div class="cont_left fl">
                <div class="uCenter">
                    <include file="Public:ucleft"/>
                </div>
            </div>
            <div class="cont_right fr">
            	<div class="user_basic">
                	<div class="u_b_title">设置新密码<span></span></div>
                    <div class="u_b_content">
						<form id="passForm" name="passForm" method="post" action="">
                    	<div class="formLine clearfix">
                        	<span class="formLabel w80"><i></i>当前密码：</span>
                            <span><input type="password" id="password" name="password" class="long"></span>
                            <span class="err_password normal"></span>
                        </div>
                        <div class="formLine clearfix">
                        	<span class="formLabel w80"><i></i>新密码：</span>
                            <span><input type="password" id="newpassword" name="newpassword" class="long"></span>
                            <span class="err_newpassword normal"></span>
                        </div>
                        <div class="formLine clearfix">
                        	<span class="formLabel w80"><i></i>确认密码：</span>
                            <span><input type="password" id="repassword" name="repassword" class="long"></span>
                            <span class="err_repassword normal"></span>
                        </div>
                        <div class="formLine clearfix">
                        	<span class="formLabel w80"></span>
                            <span><input type="button" name="submit" id="submit" value="提交"></span>
                        </div>
                        </form>
                    </div>
                </div>
                <include file="Public:uclike"/>
            </div>
        </div>       
    </div>
</div>
<include file="Public:footer_notq" />
<script type="text/javascript">
$(document).ready(function(){
	$("#password").blur(function(){		
		$(".err_password").removeClass("nomal");
		var pwd=$.trim($(this).val());
		if(pwd==""){
			$(".err_password").addClass("error").removeClass("correct").html("请输入当前密码！");
		}else{
			$(".err_password").addClass("correct").removeClass("error").html("&nbsp;");			
		}
	});
	$("#newpassword").blur(function(){		
		$(".err_newpassword").removeClass("nomal");
		var pwd=$.trim($(this).val());
		if(pwd==""){
			$(".err_newpassword").addClass("error").removeClass("correct").html("请输入密码！");
		}else{
			var pwdbool=/^[0-9a-zA-Z]{6,24}$/.test(pwd);
			if(!pwdbool){
				$(".err_newpassword").addClass("error").removeClass("correct").html("请输入6-24位英文和数字组合!");
			}else{
				$(".err_newpassword").addClass("correct").removeClass("error").html("&nbsp;");
			}			
		}
	});
	$("#repassword").blur(function(){
		$(".err_repassword").removeClass("nomal");
		var pwd=$.trim($("#newpassword").val());
		var pwdSure=$("#repassword").val();
		if(pwdSure==''){
			$(".err_repassword").addClass("error").removeClass("correct").html("请重复输入一次密码");
		}else if(pwdSure!=pwd){
			$(".err_repassword").addClass("error").removeClass("correct").html("两次输入密码不同!");
		}else{
			$(".err_repassword").addClass("correct").removeClass("error").html("&nbsp;");
		}
	});
	$('input[name="submit"]').click(function(){
		if($(".err_password").attr('class') == 'err_password normal'){
			$(".err_password").removeClass("nomal");
			var pwd=$.trim($('#password').val());
			if(pwd==""){
				$(".err_password").addClass("error").removeClass("correct").html("请输入当前密码！");
			}else{
				$(".err_password").addClass("correct").removeClass("error").html("&nbsp;");			
			}
		}
		if($(".err_newpassword").attr('class') == 'err_newpassword normal'){
			$(".err_newpassword").removeClass("nomal");
			var pwd=$.trim($('#newpassword').val());
			if(pwd==""){
				$(".err_newpassword").addClass("error").removeClass("correct").html("请输入密码！");
			}else{
				var pwdbool=/^[0-9a-zA-Z]{6,24}$/.test(pwd);
				if(!pwdbool){
					$(".err_newpassword").addClass("error").removeClass("correct").html("请输入6-24位英文和数字组合!");
				}else{
					$(".err_newpassword").addClass("correct").removeClass("error").html("&nbsp;");
				}			
			}
		}
		if($(".err_repassword").attr('class') == 'err_repassword normal'){
			$(".err_repassword").removeClass("nomal");
			var pwd=$.trim($("#newpassword").val());
			var pwdSure=$("#repassword").val();
			if(pwdSure==''){
				$(".err_repassword").addClass("error").removeClass("correct").html("请重复输入一次密码");
			}else if(pwdSure!=pwd){
				$(".err_repassword").addClass("error").removeClass("correct").html("两次输入密码不同!");
			}else{
				$(".err_repassword").addClass("correct").removeClass("error").html("&nbsp;");
			}
		}
		if($(".err_password").html()=='&nbsp;' && $(".err_newpassword").html()=='&nbsp;' && $(".err_repassword").html()=='&nbsp;'){
			var pw = $('input[name="password"]').val();
			var npw = $('input[name="newpassword"]').val();
			var repw = $('input[name="repassword"]').val();
			$.ajax({
				url: '__ROOT__/User/passwordAct',
				type: 'POST',
				data:{pw:pw,npw:npw,repw:repw},
				dataType: 'json',
				success: function(result){
					if(result.status == 1){
						$('input[name="password"]').val('');
						$('input[name="newpassword"]').val('');
						$('input[name="repassword"]').val('');
						$(".err_password").addClass("normal").removeClass("correct");
						$(".err_newpassword").addClass("normal").removeClass("correct");
						$(".err_repassword").addClass("normal").removeClass("correct");
						$('.u_b_title span').html("修改成功!");
					}else{
						fancybox(result.info);
					}
				}
			});
		}else{			
			return false;
		}
	});
});
</script>
</body>
</html>
