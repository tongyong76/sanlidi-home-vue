<!DOCTYPE HTML>
<html>
<head>
<meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
<title>注册第二步</title>
<meta name="keywords" content="">
<meta name="description" content="">
<link type="text/css" rel="stylesheet" href="../Public/css/reset.css">
<link type="text/css" rel="stylesheet" href="../Public/css/ral.css">
<script type="text/javascript" src="../Public/js/jquery-1.11.1.min.js"></script>
<script type="text/javascript" src="../Public/js/jquery.validate.min.js"></script>
<include file="Public:statistics"/>
</head>
<body>
<include file="Public:ralheader" />
<div class="ral_box clearfix">
	<div class="ral_box_header clearfix">
		<h1>注册会员</h1>
		<div class="weixin">扫描三三旅游微信，<b>轻松赢取免费游</b></div>
	</div>
	<div class="ral_box_main clearfix">
		<div class="step step2"></div>
		<div class="left">
			<form id="checkForm" method="post" action="">
				<div class="formLine clearfix">
					<span class="formLabel" style="font-size:18px;">验证账户信息</span>
				</div>
				<div class="formLine clearfix">
					<span class="formLabel">已向您手机发送一条短信验证码，该验证码10分钟内有效，请尽快完成验证！</span>
				</div>
				<div class="formLine clearfix">
					<span class="formLabel w90">手机号码：</span>
					<span style="font-size:16px;">{$phone}</span>
				</div>
				<div class="formLine clearfix">
					<span class="formLabel w90">验证码：</span>
					<span><input type="text" class="short" value="" id="verify" name="verify"></input></span>
				</div>
				<input type="hidden" name="uid" value="{$uid}">
				<div class="formLine clearfix" style="margin-top:55px;">
					<span><input type="submit" name="submit" value="确认并提交" class="submit"/></span>
				</div>
			</form>
		</div>
		<div class="right">
			<img width="250" height="500" src="../Public/images/register_side_step2.png" />
		</div>
	</div>
</div>
<script type="text/javascript">
$(document).ready(function(){
	$('#J_captcha_img').click(function(){
        var timenow = new Date().getTime(),
            url = $(this).attr('data-url').replace(/js_rand/g,timenow);				
        $(this).attr("src", url);
    });
	$('#J_captcha_change').click(function(){
        $('#J_captcha_img').trigger('click');
    });
	$("#loginForm").validate({
		rules: {
	    	mobile: {
	    	    required: true,
				rangelength: [11,11],
				digits: true,
	    	},
	    	password: {
				required: true,
				rangelength: [6,26],
	    	},
			repassword: {
				required: true,
				rangelength: [6,26],
				equalTo: "#password" 
			},
		},
		messages: {
			mobile: {
	    	    required: "手机不能为空",
				rangelength: "请填写正确手机号码",
				digits: "请填写正确手机号码",
	    	},
	    	password: {
	    	    required: "登录密码不能为空",
				rangelength: "密码应为6-20位数字、字母和符号",
	    	},
			repassword: {
				required: "请输入确认密码",
				rangelength: "密码应为6-20位数字、字母和符号",
				equalTo: "两次输入密码不一致" 
			},
		},
	});
});
</script>
</body>
</html>
